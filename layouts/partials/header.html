<header class="site-header">
  <div class="container">
    <a href="{{ .Site.BaseURL }}" class="site-title">{{ .Site.Title }}</a>
    <button class="menu-toggle" aria-label="Menu">MENU</button>
    <button id="search-toggle" aria-label="Search" style="background:none;border:none;cursor:pointer;padding:0.3rem;opacity:0.8;transition:opacity 0.2s"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-nav-text)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
    <nav class="main-nav">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL | relURL }}" class="{{ if eq $.RelPermalink (.URL | relURL) }}active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
