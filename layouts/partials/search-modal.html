<div id="search-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:10000;justify-content:center;align-items:center;font-family:Inter,sans-serif">
  <div style="background:#fff;border-radius:8px;max-width:600px;width:90%;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.3);position:relative;z-index:10001">
    <div style="display:flex;padding:1rem;border-bottom:1px solid #ddd;gap:0.5rem">
      <input type="text" id="search-input" placeholder="Search pages..." style="flex:1;padding:0.75rem 1rem;border:1px solid #ccc;border-radius:4px;font-size:1rem;outline:none;font-family:Inter,sans-serif">
      <button id="search-close" style="background:none;border:none;font-size:1.5rem;cursor:pointer;padding:0.5rem;color:#666">&times;</button>
    </div>
    <div id="search-results" style="flex:1;overflow-y:auto;padding:0;margin:0"></div>
  </div>
</div>
<script>
(function(){
  var docs=[], ready=false;

  function init(){
    var r=new XMLHttpRequest();
    r.open('GET','/index.json',true);
    r.onload=function(){
      if(r.status===200){
        try{
          docs=JSON.parse(r.responseText);
          ready=true;
          console.log('Search: '+docs.length+' pages loaded');
        }catch(e){console.error('Search parse error:',e);}
      }else{console.error('Search index HTTP',r.status);}
    };
    r.onerror=function(){console.error('Search fetch error');};
    r.send();
  }

  function doSearch(q){
    if(!ready)return '<div style="padding:1rem;color:#888">Loading...</div>';
    if(q.length<2)return '';
    var ql=q.toLowerCase();
    var results=[];
    for(var i=0;i<docs.length;i++){
      var d=docs[i];
      var t=(d.title||'').toLowerCase();
      var c=(d.content||'').toLowerCase().substring(0,3000);
      var s=(d.summary||'').toLowerCase();
      if(t.indexOf(ql)>=0||c.indexOf(ql)>=0||s.indexOf(ql)>=0){
        results.push(d);
      }
    }
    if(!results.length)return '<div style="padding:1rem;color:#888">No results for "'+q.replace(/</g,'&lt;')+'"</div>';
    var html='';
    for(var j=0;j<results.length;j++){
      var d=results[j];
      var sum=(d.summary||d.content||'').substring(0,200).replace(/</g,'&lt;').replace(/>/g,'&gt;');
      html+='<a href="'+d.url+'" style="display:block;padding:1rem 1.5rem;border-bottom:1px solid #eee;text-decoration:none;color:#333">';
      html+='<strong style="display:block;font-family:serif;font-size:1.1rem;margin-bottom:0.3rem;color:#000">'+(d.title||'').replace(/</g,'&lt;')+'</strong>';
      html+='<span style="color:#666;font-size:0.9rem;line-height:1.4">'+sum+'...</span></a>';
    }
    return html;
  }

  function open(){document.getElementById('search-modal').style.display='flex';document.getElementById('search-input').focus();}
  function close(){document.getElementById('search-modal').style.display='none';document.getElementById('search-input').value='';document.getElementById('search-results').innerHTML='';}

  document.addEventListener('DOMContentLoaded',function(){
    init();
    var btns=document.querySelectorAll('#search-toggle');
    for(var i=0;i<btns.length;i++){btns[i].addEventListener('click',open);}
    document.getElementById('search-close').addEventListener('click',close);
    document.getElementById('search-modal').addEventListener('click',function(e){if(e.target===this)close();});
    document.getElementById('search-input').addEventListener('input',function(){
      document.getElementById('search-results').innerHTML=doSearch(this.value.trim());
    });
    document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
  });
})();
</script>
