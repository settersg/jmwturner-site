<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  {{ if or (eq .Section "categories") (eq .Section "tags") }}<meta name="robots" content="noindex, nofollow">{{ end }}
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  {{ partial "header.html" . }}
  <main class="content">
    {{ block "main" . }}{{ end }}
  </main>
    {{ partial "search-modal.html" . }}
  {{ partial "footer.html" . }}

</body>
</html>
