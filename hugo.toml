baseURL = "https://rescuingturner.com/"
languageCode = "en-ca"
title = "Shipwreck, the Rescue -- JMW Turner"
theme = "turner"

[params]
  description = "A co-operative art project exploring J.M.W. Turner's Shipwreck, the Rescue -- provenance, forensics, connoisseurship, and the art world's hidden stories."
  author = "Graham Setters"
  bookTitle = "Rescuing J.M.W. Turner -- A New Age of Art Discovery"

[outputs]
  home = ["HTML", "JSON", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

