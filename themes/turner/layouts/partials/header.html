<header class="site-header">
  <div class="container">
    <a href="/" class="site-title">{{ .Site.Title }}</a>
    <button class="menu-toggle" aria-label="Menu">☰</button>
    <nav class="main-nav">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" class="{{ if eq $.RelPermalink .URL }}active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
