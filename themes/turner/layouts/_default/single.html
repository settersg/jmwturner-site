{{ define "main" }}
<div class="page-layout">
  <aside class="sidebar">
    {{ if .Site.Menus.sections }}
    <h3>Contents</h3>
    <ul>
      {{ range .Site.Menus.sections }}
      <li><a href="{{ .URL | relURL }}" class="{{ if eq $.RelPermalink (.URL | relURL) }}active{{ end }}">{{ .Name }}</a></li>
      {{ end }}
    </ul>
    {{ end }}
  </aside>
  <article class="article">
    <h1>{{ .Title }}</h1>
    {{ if .Params.meta }}<p class="meta">{{ .Params.meta }}</p>{{ end }}
    {{ .Content }}
  </article>
</div>
{{ end }}
