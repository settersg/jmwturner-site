{{ define "main" }}
<section class="gallery-intro">
  <h1>{{ .Title }}</h1>
  {{ if .Content }}<div class="article" style="max-width:700px;margin:1rem auto;text-align:left;">{{ .Content }}</div>{{ end }}
</section>
<div class="gallery-grid">
  {{ range .Resources.ByType "image" }}
  <div class="gallery-item">
    <img src="{{ .RelPermalink }}" alt="{{ .Name }}" loading="lazy">
    <div class="caption">{{ .Name | strings.TrimSuffix (path.Ext .Name) | replaceRE "[-_]" " " | title }}</div>
  </div>
  {{ end }}
  {{ range .Pages }}
  <div class="gallery-item">
    {{ if .Params.image }}<img src="{{ .Params.image }}" alt="{{ .Title }}" loading="lazy">{{ end }}
    <div class="caption"><a href="{{ .RelPermalink }}">{{ .Title }}</a></div>
  </div>
  {{ end }}
</div>
{{ end }}
